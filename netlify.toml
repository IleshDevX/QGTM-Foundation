[build]
command = "bun run build"
publish = "dist"
node_version = "22.0.0"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/dist/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"
